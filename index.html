<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <!-- КРИТИЧЕСКИ ВАЖНО: Preload фона САМЫМ ПЕРВЫМ для максимальной скорости -->
    <link rel="preload" href="/assets/stuff/background.jpg" as="image" fetchpriority="high" crossorigin="anonymous" />
    <!-- DNS prefetch для быстрой загрузки внешних ресурсов -->
    <link rel="dns-prefetch" href="https://telegram.org" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <meta
      name="description"
      content="Telegram Networking App - мини-приложение для нетворкинга"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Preload других критически важных ресурсов -->
    <link rel="preload" href="/assets/stuff/logo.png" as="image" />
    <!-- Оптимизация шрифтов: используем font-display=swap для быстрой загрузки -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=La+Bamba&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=La+Bamba&display=swap" rel="stylesheet"></noscript>
    <title>Telegram Networking App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" style="min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
